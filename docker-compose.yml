services:
  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: medical-audit-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_audit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - medical-audit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-audit-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/medical_audit
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medical-audit-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical-audit-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - medical-audit-network

volumes:
  postgres_data:

networks:
  medical-audit-network:
    driver: bridge
